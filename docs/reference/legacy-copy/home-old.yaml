    hero.title: "Professional Development for Educators"
    hero.description: "Katie Statman-Weil, EdD, LCSW offers professional development for early childhood educators online and in-person. Through practical, relationship-centered trainings Katie supports educators wanting to learn more about child development, behavior, trauma, neurodivergence, emotional regulation, and play-based strategies. Katie’s goal is always to ensure teachers feel heard, children feel supported, and relationships can thrive."
    hero.cta: "Learn how Katie can support your organization"
    hero.ctaHref: "https://www.withconnectionpdx.com/contact-us"
    partners.title: "Past Presentations and Partnerships"
    about.title: "Meet Katie Statman-Weil, EdD, LCSW"
    about.paragraph1: "Katie Statman-Weil is a clinician, educator, consultant, and trainer with extensive experience supporting children, families, and school systems navigating complex behavioral and neurodevelopmental differences. Katie specializes in trauma-responsive care, attachment, neurodivergence, and relational approaches to behavior support."
    about.paragraph2: "She believes that when we understand how a child’s brain and nervous system work, we begin to understand the meaning behind behavior and can respond in ways that prioritize connection, safety, and regulation rather than compliance and control."
    about.paragraph3: "Katie’s goal is to support educators and helping professionals feel more grounded, confident, and effective in their relationships with children, while also honoring the emotional weight and complexity of the work they are carrying. She recognizes that supporting children with significant behavioral needs impacts not only systems and classrooms, but also the well-being of the adults who care for them."
    about.paragraph4: "When both the child’s experience and the educator’s experience are held with equal care, there is more clarity, more compassion, and more possibility for meaningful change."
    closing.cta: "Bring Katie To Your Organization"
    closing.ctaHref: "https://www.withconnectionpdx.com/contact-us"
