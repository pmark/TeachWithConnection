  lists:
    about.paragraphs:
      - "Katie Statman-Weil is a clinician, educator, consultant, and trainer with extensive experience supporting children, families, and school systems navigating complex behavioral and neurodevelopmental differences. Katie specializes in trauma-responsive care, attachment, neurodivergence, and relational approaches to behavior support."
      - "She believes that when we understand how a child's brain and nervous system work, we begin to understand the meaning behind behavior and can respond in ways that prioritize connection, safety, and regulation rather than compliance and control."
      - "Katie's goal is to support educators and helping professionals feel more grounded, confident, and effective in their relationships with children, while also honoring the emotional weight and complexity of the work they are carrying. She recognizes that supporting children with significant behavioral needs impacts not only systems and classrooms, but also the well-being of the adults who care for them."
      - "When both the child's experience and the educator's experience are held with equal care, there is more clarity, more compassion, and more possibility for meaningful change."
    professionalDevelopment.focus:
      - "Early childhood educators working with complex behavior, trauma histories, neurodivergence, and classroom dysregulation."
      - "Schools, districts, centers, and organizations that need a shared relationship-centered framework."
      - "Teams that want practical tools without reducing behavior support to compliance or control."
      - "Leaders who want educators to feel heard while children receive more attuned support."
    professionalDevelopment.outcomes:
      - "A shared language for behavior, regulation, trauma, attachment, and neurodivergence."
      - "Practical classroom strategies that fit real children and real teaching teams."
      - "More confidence responding to dysregulation without escalating shame, stress, or disconnection."
      - "A clearer path from crisis response toward prevention, connection, and sustainable support."
    professionalDevelopment.formats:
      - "Staff professional development days"
      - "Focused workshops and training series"
      - "Conference keynotes and breakout sessions"
