  cards:
    trainings.items:
      - title: "Working With Children Who Have Experienced Trauma"
        description: "Using the framework outlined in Katie’s book, Creating Trauma Responsive Strategies for Early Childhood, this training supports educators in understanding the impact of trauma on young children’s development. Tools to offer safety, connection, and behavioral changes that lead to healing and resilience are offered."
        label: "Accordion item 1"
        href: "https://www.redleafpress.org/Trauma-Responsive-Strategies-for-Early-Childhood-P2503.aspx"
      - title: "Understanding and Responding to Behavior"
        description: "Behavior is a form of communication. In this training, we explore what’s beneath the surface and offer supportive, relationship-based tools for responding to children with clarity and care."
        label: "Accordion item 2"
      - title: "Understanding Neurodivergence and Creating Neuroaffirming Classrooms"
        description: "Learn how to recognize and honor diverse ways of thinking and learning, and create inclusive spaces where all neurodivergent children feel valued, understood, and empowered."
        label: "Accordion item 3"
      - title: "Understanding Pervasive Drive for Autonomy (PDA) in the Classroom"
        description: "Discover how PDA shapes children’s behavior and learn compassionate strategies to support their unique needs while fostering connection and cooperation."
        label: "Accordion item 4"
      - title: "The Classroom Environment as a Regulator"
        description: "Using the Environment as the Third Regulator. Creating classroom environments that act as regulating forces for all children"
        label: "Accordion item 5"
      - title: "Working with children who have experienced foster care and adoption"
        description: "This training offers insight into the unique experiences of children who have been adopted or have experienced foster care. It provides relationship-centered tools to support trust, safety, and connection in the classroom."
        label: "Accordion item 6"
      - title: "Understanding The Impact of Neonatal Drug Exposure on Development"
        description: "Gain compassionate insight into Neonatal Opioid Withdrawal Syndrome (NOWS/NAS) and learn how to support the unique needs of affected children with patience and care."
        label: "Accordion item 7"
