    philosophy.title: "Core philosophy"
    credibility.eyebrow: "Credibility"
    credibility.title: "Author, NAEYC writer, and early childhood professional development leader"
    credibility.description: "The publications page highlights Katie's Redleaf Press book, NAEYC article, award recognition, and related writing."
    credibility.cta: "Review publications"
  lists:
    background.paragraphs:
      - "Katie brings experience as a preschool teacher, center director, early childhood college professor, early childhood mental health consultant, clinician, trainer, and consultant."
      - "She is the founder of With Connection and co-founded Wild Lilac Child Development Community, a Portland nonprofit early childhood education and parent support organization."
      - "Her professional development work stays educator-facing while drawing from attachment, trauma-responsive care, neurodivergence, regulation, child development, and relationship-centered behavior support."
    philosophy.items:
      - "Connection and safety are the foundation for meaningful change."
      - "Behavior is communication shaped by development, relationships, stress, and context."
      - "Regulation grows through shared adult-child work, not isolated child compliance."
      - "Neuroaffirming support honors different nervous systems, communication needs, and ways of moving through the world."
