    seo.title: "About Katie Statman-Weil, EdD, LCSW"
    seo.description: "Meet Katie Statman-Weil, EdD, LCSW, With Connection founder, author, clinician, consultant, and early childhood professional development trainer."
    hero.eyebrow: "About"
    hero.title: "Katie Statman-Weil, EdD, LCSW"
    hero.description: "Katie is the founder of With Connection and an educator, clinician, author, consultant, trainer, and speaker whose work helps adults understand children's behavior through connection, safety, regulation, and development."
    hero.primaryCta: "Bring Katie to your organization"
    hero.secondaryCta: "View publications"
