route: "/consultation/"
status: approved
copy:
  strings:
    seo.title: "Consultation"
    seo.description: "Consultation for early childhood schools, centers, directors, and teaching teams nationwide facing complex classroom behavior or dysregulation."
    structuredData.name: "Early Childhood Team Consultation"
    hero.eyebrow: "Consultation"
    hero.title: "Support for complex classroom and team challenges"
    hero.description: "Consultation helps schools, centers, directors, and teaching teams make sense of escalating behavior, educator exhaustion, strained relationships, and classroom dysregulation."
    hero.photoAlt: "Katie Statman-Weil speaking with someone in a bright office"
    hero.primaryCta: "Inquire about consultation"
    hero.secondaryCta: "Professional development overview"
    background.lead: "Will anything help this student be less challenging?"
    background.paragraph1: "Dr. Katie Statman-Weil, LCSW offers consultation to teachers and schools in Portland, Oregon and online nationwide. Katie has direct experience working as a preschool teacher, center director, ece college professor, and ece mental health consultant. Katie understands what it feels like to work with kids with big, confusing, and challenging behaviors in the classroom."
    background.paragraph2: "Katie's teacher consultations help shift perspectives on children exhibiting challenging behaviors to find lasting strategies that calm the chaos and brings more joy into the teaching experience."
    background.paragraph3: "Through relational, trauma-responsive, and neuroaffirming approaches Katie supports teachers in moving beyond crisis management and toward classrooms where both students and educators can feel more regulated, capable, and connected."
    fit.eyebrow: "When Consultation Helps"
    fit.title: "For teams that are trying hard and still feeling stuck"
    fit.description: "Consultation is a fit when current strategies are not creating enough calm, safety, or clarity for the child, the adults, or the larger classroom community."
    lens.eyebrow: "Consultation Lens"
    lens.title: "Practical strategy without losing the emotional reality of the work"
    lens.description: "The work looks at both the child's experience and the educator's experience, then helps the team identify supports that are relational, trauma-responsive, neuroaffirming, and sustainable."
    lens.secondaryDescription: "Share the classroom situation, team needs, and timeline in your inquiry so Katie can help determine whether consultation or broader professional development is the better fit."
    testimonial.eyebrow: "From Teams"
    testimonial.title: "What participants say"
    inquiry.title: "Inquire about consultation"
  lists:
    fit.items:
      - "A student's behaviors have **continued to escalate** despite the many interventions, strategies, and supports your team has already tried."
      - "Your staff feels emotionally exhausted, overwhelmed, or constantly \"on edge\" while trying to manage the intensity of the classroom environment."
      - "The relationship between educators and the student feels increasingly strained, disconnected, or stuck in cycles of conflict and dysregulation."
      - "Supporting one child's needs has begun to impact the well-being of the larger classroom community, staff morale, or team cohesion."
      - "Teaching teams feel discouraged, ineffective, or uncertain about how to move forward in a way that truly supports the child."
      - "You find yourselves spending most of the day reacting to crises rather than teaching, connecting, and building a positive classroom culture."
      - "Staff members are struggling to balance compassion for the child with the very real stress and demands of the situation."
      - "You worry about whether your current approaches are helping, or unintentionally increasing stress, shame, or dysregulation for the child."
      - "Your team is looking for a more relational, trauma-responsive, and neuroaffirming framework for understanding and responding to behavior."
      - "You want practical, sustainable strategies that support both the child and the adults caring for them."
    lens.items:
      - "Connection and safety before compliance."
      - "Behavior as communication, not defiance in isolation."
      - "Regulation as shared adult-child work shaped by relationships and environments."
      - "Neuroaffirming support that honors different nervous systems and communication needs."
  cards: {}
