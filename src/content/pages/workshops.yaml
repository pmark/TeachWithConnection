route: "/workshops/"
status: approved
copy:
  strings:
    seo.title: "Workshops"
    seo.description: "Workshop topics for early childhood teams, including trauma, neurodivergence, behavior, regulation, PDA, and foster care or adoption."
    structuredData.name: "Early Childhood Educator Workshops"
    hero.eyebrow: "Workshops"
    hero.title: "Practical training topics for educators and leaders"
    hero.description: "Workshops help teaching teams understand what may be driving behavior, stress, resistance, and dysregulation so they can respond with more clarity and care."
    hero.photoAlt: "Two young children smiling and holding hands outdoors"
    hero.primaryCta: "Bring a workshop to your team"
    hero.secondaryCta: "Professional development overview"
    problem.title: "Maybe your teaching team is feeling stuck…"
    problem.paragraph1: "You may be noticing that despite your team's best efforts, behaviors continue to escalate. The usual strategies, routines, behavior plans, consequences, and incentives do not make the difference you hoped for. In some cases, the more you do, the more stress, dysregulation, or resistance you find."
    problem.paragraph2: "Playing behavior wack-a-mole leaves educators feeling frustrated and drained, questioning what else they are supposed to try when they are already doing everything they were trained to do. There may be a growing sense of tension in the classroom, concern about the impact on other students, and uncertainty about how to support children whose needs feel increasingly complex."
    problem.paragraph3: "Beneath the struggle, beneath the complaints, there may be a quieter concern: we want to help, but nothing we're doing seems to be working, maybe we can't."
    need.title: "What your team may really need is…"
    need.lead: "Clear, compassionate, and practical guidance to make sense of what is actually driving behavior, not just how to manage it."
    need.paragraph1: "You may need a shared framework that helps your whole staff understand behavior through a different lens: one that considers nervous system development, trauma, sensory processing, attachment, and neurodivergence."
    need.paragraph2: "Most importantly, you may need a guiding philosophy that helps shift from reaction and crisis management toward connection, regulation, and prevention, so that both students and educators can experience more calm, clarity, and success in the classroom."
    need.paragraph3: "You are not looking for more generic strategies or rigid systems. You're looking for understanding that fits the complexity of real children in real classrooms, and practical tools your team can actually use together."
    topics.eyebrow: "Workshop Topics"
    topics.title: "Training themes grounded in real classroom complexity"
    topics.description: "Topics can be shaped for early childhood organizations, schools, districts, and conference audiences."
    lens.eyebrow: "Shared Lens"
    lens.title: "The goal is not another rigid system"
    lens.description: "Across topics, the work stays focused on understanding children and educators with equal care."
    testimonial.eyebrow: "From Educators"
    testimonial.title: "What participants say"
    inquiry.title: "Bring a workshop to your team"
  lists:
    lens.items:
      - "Connection and safety before compliance."
      - "Behavior as communication, not defiance in isolation."
      - "Regulation as shared adult-child work shaped by relationships and environments."
      - "Neuroaffirming support that honors different nervous systems and communication needs."
  cards:
    topics.items:
      - title: "Working with children who have experienced trauma"
        description: "A training grounded in Katie's book that helps educators understand trauma's classroom impact and respond with safety, connection, and resilience in mind."
        label: "Learn more about the book"
        href: "https://www.redleafpress.org/Trauma-Responsive-Strategies-for-Early-Childhood-P2503.aspx"
      - title: "Understanding and responding to behavior"
        description: "A relationship-based frame for looking beneath surface behaviors and responding with clarity, care, and practical classroom support."
      - title: "Understanding neurodivergence and creating neuroaffirming classrooms"
        description: "Support for recognizing diverse nervous systems, learning profiles, and communication patterns so children feel understood and included."
      - title: "Understanding Pervasive Drive for Autonomy (PDA) in the classroom"
        description: "A compassionate look at PDA-related needs and strategies that protect connection while reducing unnecessary power struggles."
      - title: "The classroom environment as a regulator"
        description: "A practical exploration of classroom environments as part of a child's regulation system, with attention to safety, belonging, and predictability."
      - title: "Working with children who have experienced foster care and adoption"
        description: "Insight into adoption and foster care experiences, with relationship-centered tools for trust, safety, and connection in the classroom."
      - title: "Understanding the impact of neonatal drug exposure on development"
        description: "A compassionate training on NOWS/NAS and classroom supports for children whose early development was shaped by neonatal drug exposure."
